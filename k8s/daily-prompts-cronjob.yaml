apiVersion: batch/v1
kind: CronJob
metadata:
  name: select-daily-prompts
  namespace: days-of-art
spec:
  schedule: "0 0 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: select-daily-prompts
              image: ghcr.io/example/365-days-of-art-backend:latest
              imagePullPolicy: IfNotPresent
              workingDir: /app
              command: ["flask", "--app", "run.py", "select-daily-prompts"]
              envFrom:
                - configMapRef:
                    name: backend-config
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: backend-secrets
                      key: database-url
